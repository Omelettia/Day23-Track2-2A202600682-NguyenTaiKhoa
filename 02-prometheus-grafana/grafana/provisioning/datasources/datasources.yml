apiVersion: 1

datasources:
  - name: Prometheus
    # Pinned uid: every dashboard panel references datasource uid "prometheus".
    # Without this, Grafana auto-generates a random uid and EVERY panel fails
    # with "Data source not found" (404) — dashboards render all "No Data".
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-fA-F0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: jaeger

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
